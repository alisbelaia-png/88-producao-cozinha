<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Acerto Padaria</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      padding: 16px;
    }

    h1 {
      text-align: center;
      font-size: 20px;
      margin-bottom: 4px;
      color: #e94560;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .tipo-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .tipo-btn {
      flex: 1;
      padding: 14px;
      border: 2px solid #333;
      border-radius: 12px;
      background: #16213e;
      color: #aaa;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .tipo-btn.active-compra    { border-color: #e94560; background: rgba(233,69,96,0.15);   color: #e94560; }
    .tipo-btn.active-venda     { border-color: #4ecca3; background: rgba(78,204,163,0.15);  color: #4ecca3; }
    .tipo-btn.active-pagamento { border-color: #f7b731; background: rgba(247,183,49,0.15);  color: #f7b731; }

    .produtos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .produto-btn {
      padding: 18px 10px;
      border: 2px solid #333;
      border-radius: 12px;
      background: #16213e;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .produto-btn .emoji { font-size: 22px; display: block; margin-bottom: 4px; }
    .produto-btn .preco { font-size: 11px; color: #888; font-weight: 400; }
    .produto-btn.selected           { border-color: #e94560; background: rgba(233,69,96,0.15); }
    .produto-btn.venda-mode.selected{ border-color: #4ecca3; background: rgba(78,204,163,0.15); }
    .produto-btn:disabled           { opacity: 0.3; cursor: not-allowed; }

    .qtd-section { margin-bottom: 20px; }
    .qtd-row { display: flex; align-items: center; gap: 12px; }
    .qtd-btn {
      width: 52px; height: 52px;
      border: 2px solid #444; border-radius: 50%;
      background: #16213e; color: #fff;
      font-size: 24px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0;
    }
    .qtd-btn:active { transform: scale(0.92); }
    .qtd-input {
      flex: 1; padding: 14px;
      border: 2px solid #444; border-radius: 12px;
      background: #16213e; color: #fff;
      font-size: 24px; font-weight: 700; text-align: center;
    }
    .qtd-input:focus { outline: none; border-color: #e94560; }

    .pagamento-section { display: none; margin-bottom: 20px; }
    .pagamento-section.visible { display: block; }
    .valor-input {
      width: 100%; padding: 18px 14px;
      border: 2px solid #f7b731; border-radius: 12px;
      background: #16213e; color: #f7b731;
      font-size: 28px; font-weight: 800; text-align: center;
    }
    .valor-input:focus { outline: none; }
    .valor-input::placeholder { color: #555; font-size: 18px; font-weight: 400; }

    .data-input {
      width: 100%; padding: 12px 14px;
      border: 2px solid #333; border-radius: 12px;
      background: #16213e; color: #fff;
      font-size: 14px; margin-bottom: 20px;
    }
    .data-input:focus { outline: none; border-color: #888; }
    .data-input::placeholder { color: #555; }

    .resumo-box {
      background: #16213e; border: 2px solid #333;
      border-radius: 12px; padding: 14px 16px;
      margin-bottom: 20px; text-align: center;
    }
    .resumo-valor { font-size: 28px; font-weight: 800; color: #e94560; }
    .resumo-valor.venda     { color: #4ecca3; }
    .resumo-valor.pagamento { color: #f7b731; }
    .resumo-desc { font-size: 13px; color: #888; margin-top: 2px; }

    .btn-enviar {
      width: 100%; padding: 18px; border: none;
      border-radius: 14px; background: #e94560;
      color: #fff; font-size: 18px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px;
    }
    .btn-enviar:active   { transform: scale(0.97); }
    .btn-enviar:disabled { background: #333; color: #666; cursor: not-allowed; }
    .btn-enviar.venda-mode    { background: #4ecca3; color: #1a1a2e; }
    .btn-enviar.pagamento-mode{ background: #f7b731; color: #1a1a2e; }

    .feedback {
      display: none; padding: 14px; border-radius: 12px;
      text-align: center; font-weight: 600;
      margin-top: 12px; font-size: 15px;
    }
    .feedback.ok   { background: rgba(78,204,163,0.2); color: #4ecca3; border: 1px solid #4ecca3; }
    .feedback.erro { background: rgba(233,69,96,0.2);  color: #e94560; border: 1px solid #e94560; }

    .historico-section { margin-top: 28px; }
    .historico-item {
      background: #16213e; border-radius: 10px;
      padding: 10px 14px; margin-bottom: 8px;
      display: flex; justify-content: space-between;
      align-items: center; font-size: 13px;
    }
    .historico-item .tag {
      font-size: 11px; padding: 2px 8px;
      border-radius: 20px; font-weight: 600;
    }
    .tag-compra    { background: rgba(233,69,96,0.2);  color: #e94560; }
    .tag-venda     { background: rgba(78,204,163,0.2); color: #4ecca3; }
    .tag-pagamento { background: rgba(247,183,49,0.2); color: #f7b731; }
    .historico-item .valor { font-weight: 700; }
    .historico-item .descricao { color: #aaa; margin-top: 2px; }
  </style>
</head>
<body>

<h1>🍔 Acerto Padaria</h1>
<p class="subtitle">88 PizzaBurger</p>

<p class="section-title">Tipo de lançamento</p>
<div class="tipo-row">
  <button class="tipo-btn active-compra" id="btn-compra"    onclick="setTipo('COMPRA')">🛒 Eu comprei</button>
  <button class="tipo-btn"               id="btn-venda"     onclick="setTipo('VENDA')">🍓 Vendi</button>
  <button class="tipo-btn"               id="btn-pagamento" onclick="setTipo('PAGAMENTO')">💰 Paguei</button>
</div>

<div id="secao-produtos">
  <p class="section-title">Produto</p>
  <div class="produtos-grid">
    <button class="produto-btn selected" id="btn-XIS"     onclick="setProduto('XIS')">
      <span class="emoji">🍔</span>Pão Xis<span class="preco">R$ 2,00/un</span>
    </button>
    <button class="produto-btn"          id="btn-DOG"     onclick="setProduto('DOG')">
      <span class="emoji">🌭</span>Pão Dog<span class="preco">R$ 2,00/un</span>
    </button>
    <button class="produto-btn"          id="btn-FARINHA" onclick="setProduto('FARINHA')">
      <span class="emoji">🥣</span>Farinha de Rosca<span class="preco">R$ 13,00/kg</span>
    </button>
    <button class="produto-btn"          id="btn-MORANGO" onclick="setProduto('MORANGO')" disabled>
      <span class="emoji">🍓</span>Morango<span class="preco">R$ 20,00/kg</span>
    </button>
  </div>

  <p class="section-title">Quantidade</p>
  <div class="qtd-section">
    <div class="qtd-row">
      <button class="qtd-btn" onclick="ajustarQtd(-1)">−</button>
      <input type="number" class="qtd-input" id="quantidade" value="10" min="0" step="1" oninput="atualizarResumo()">
      <button class="qtd-btn" onclick="ajustarQtd(+1)">+</button>
    </div>
  </div>
</div>

<div class="pagamento-section" id="secao-pagamento">
  <p class="section-title">Valor pago (R$)</p>
  <input type="number" class="valor-input" id="valor-pagamento" placeholder="0,00" min="0" step="0.01" oninput="atualizarResumo()">
</div>

<p class="section-title">Data de referência</p>
<input type="text" class="data-input" id="data-ref" placeholder="Ex: 08/05, Pix 08/05, até 10/05...">

<div class="resumo-box">
  <div class="resumo-valor" id="resumo-valor">R$ 20,00</div>
  <div class="resumo-desc"  id="resumo-desc">10 un × R$ 2,00</div>
</div>

<button class="btn-enviar" id="btn-enviar" onclick="enviar()">✅ Registrar lançamento</button>
<div class="feedback" id="feedback"></div>

<div class="historico-section">
  <p class="section-title">Últimos registros (esta sessão)</p>
  <div id="historico"></div>
</div>

<script>
  const WEBHOOK_URL = 'https://cluckingelephant-n8n.cloudfy.live/webhook/acerto-padaria';

  const precos   = { XIS: 2.00, DOG: 2.00, FARINHA: 13.00, MORANGO: 20.00 };
  const unidades = { XIS: 'un', DOG: 'un', FARINHA: 'kg',  MORANGO: 'kg'  };

  let tipoAtual    = 'COMPRA';
  let produtoAtual = 'XIS';

  function setTipo(tipo) {
    tipoAtual = tipo;

    document.getElementById('btn-compra').className    = 'tipo-btn' + (tipo === 'COMPRA'    ? ' active-compra'    : '');
    document.getElementById('btn-venda').className     = 'tipo-btn' + (tipo === 'VENDA'     ? ' active-venda'     : '');
    document.getElementById('btn-pagamento').className = 'tipo-btn' + (tipo === 'PAGAMENTO' ? ' active-pagamento' : '');

    const secProdutos  = document.getElementById('secao-produtos');
    const secPagamento = document.getElementById('secao-pagamento');
    const btnEnviar    = document.getElementById('btn-enviar');

    if (tipo === 'PAGAMENTO') {
      secProdutos.style.display = 'none';
      secPagamento.classList.add('visible');
      btnEnviar.className = 'btn-enviar pagamento-mode';
      document.getElementById('valor-pagamento').value = '';
      atualizarResumo();
      return;
    }

    secProdutos.style.display = 'block';
    secPagamento.classList.remove('visible');

    ['XIS','DOG','FARINHA','MORANGO'].forEach(function(p) {
      const btn = document.getElementById('btn-' + p);
      if (tipo === 'VENDA') {
        btn.disabled  = (p !== 'MORANGO');
        btn.className = 'produto-btn venda-mode';
      } else {
        btn.disabled  = false;
        btn.className = 'produto-btn';
      }
    });

    if (tipo === 'VENDA') {
      setProduto('MORANGO');
      btnEnviar.className = 'btn-enviar venda-mode';
    } else {
      if (produtoAtual === 'MORANGO') setProduto('XIS');
      btnEnviar.className = 'btn-enviar';
    }

    atualizarResumo();
  }

  function setProduto(produto) {
    produtoAtual = produto;
    ['XIS','DOG','FARINHA','MORANGO'].forEach(function(p) {
      const btn  = document.getElementById('btn-' + p);
      const base = tipoAtual === 'VENDA' ? 'produto-btn venda-mode' : 'produto-btn';
      btn.className = base + (p === produto ? ' selected' : '');
    });
    atualizarResumo();
  }

  function ajustarQtd(delta) {
    const input = document.getElementById('quantidade');
    const atual = parseFloat(input.value) || 0;
    const step  = (produtoAtual === 'FARINHA' || produtoAtual === 'MORANGO') ? 0.5 : 5;
    input.value = Math.max(0, atual + (delta * step));
    atualizarResumo();
  }

  function atualizarResumo() {
    const resumoValor = document.getElementById('resumo-valor');
    const resumoDesc  = document.getElementById('resumo-desc');

    if (tipoAtual === 'PAGAMENTO') {
      const val = parseFloat(document.getElementById('valor-pagamento').value) || 0;
      resumoValor.textContent = 'R$ ' + val.toFixed(2).replace('.', ',');
      resumoValor.className   = 'resumo-valor pagamento';
      resumoDesc.textContent  = 'Pagamento a registrar';
      return;
    }

    const qtd   = parseFloat(document.getElementById('quantidade').value) || 0;
    const preco = precos[produtoAtual] || 0;
    const total = qtd * preco;
    const und   = unidades[produtoAtual];

    resumoValor.textContent = 'R$ ' + total.toFixed(2).replace('.', ',');
    resumoValor.className   = 'resumo-valor' + (tipoAtual === 'VENDA' ? ' venda' : '');
    resumoDesc.textContent  = qtd + ' ' + und + ' × R$ ' + preco.toFixed(2).replace('.', ',');
  }

  async function enviar() {
    const dataRef = document.getElementById('data-ref').value || '';
    let payload   = {};

    if (tipoAtual === 'PAGAMENTO') {
      const val = parseFloat(document.getElementById('valor-pagamento').value) || 0;
      if (val <= 0) { mostrarFeedback('erro', '⚠️ Informe o valor do pagamento'); return; }
      payload = { tipo: 'PAGAMENTO', produto: 'PAGAMENTO', quantidade: 1, valor_total: val, observacao: dataRef };
    } else {
      const qtd = parseFloat(document.getElementById('quantidade').value) || 0;
      if (qtd <= 0) { mostrarFeedback('erro', '⚠️ Informe uma quantidade válida'); return; }
      payload = { tipo: tipoAtual, produto: produtoAtual, quantidade: qtd, observacao: dataRef };
    }

    const btn = document.getElementById('btn-enviar');
    btn.disabled    = true;
    btn.textContent = '⏳ Registrando...';

    try {
      const resp = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (resp.ok) {
        if (tipoAtual === 'PAGAMENTO') {
          mostrarFeedback('ok', '✅ Pagamento de R$ ' + payload.valor_total.toFixed(2).replace('.', ',') + ' registrado!');
          adicionarHistoricoPagamento(payload.valor_total, dataRef);
          document.getElementById('valor-pagamento').value = '';
        } else {
          const total = payload.quantidade * precos[produtoAtual];
          const und   = unidades[produtoAtual];
          const emoji = tipoAtual === 'COMPRA' ? '🛒' : '🍓';
          mostrarFeedback('ok', '✅ ' + emoji + ' ' + produtoAtual + ' ' + payload.quantidade + und + ' = R$ ' + total.toFixed(2).replace('.', ','));
          adicionarHistorico(payload, total, und, dataRef);
        }
        document.getElementById('data-ref').value   = '';
        document.getElementById('quantidade').value = '10';
        atualizarResumo();
      } else {
        mostrarFeedback('erro', '❌ Erro ao registrar. Tente novamente.');
      }
    } catch(e) {
      mostrarFeedback('erro', '❌ Sem conexão. Verifique o n8n.');
    }

    btn.disabled    = false;
    btn.textContent = '✅ Registrar lançamento';
  }

  function mostrarFeedback(tipo, msg) {
    const el = document.getElementById('feedback');
    el.className      = 'feedback ' + tipo;
    el.textContent    = msg;
    el.style.display  = 'block';
    setTimeout(function() { el.style.display = 'none'; }, 4000);
  }

  function adicionarHistorico(payload, total, und, dataRef) {
    const div  = document.getElementById('historico');
    const hora = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    const item = document.createElement('div');
    item.className = 'historico-item';
    item.innerHTML =
      '<div>' +
        '<div><span class="tag tag-' + payload.tipo.toLowerCase() + '">' + payload.tipo + '</span> <strong>' + payload.produto + '</strong></div>' +
        '<div class="descricao">' + payload.quantidade + und + (dataRef ? ' — ' + dataRef : '') + ' — ' + hora + '</div>' +
      '</div>' +
      '<div class="valor">R$ ' + total.toFixed(2).replace('.', ',') + '</div>';
    div.insertBefore(item, div.firstChild);
  }

  function adicionarHistoricoPagamento(val, dataRef) {
    const div  = document.getElementById('historico');
    const hora = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    const item = document.createElement('div');
    item.className = 'historico-item';
    item.innerHTML =
      '<div>' +
        '<div><span class="tag tag-pagamento">PAGAMENTO</span></div>' +
        '<div class="descricao">' + (dataRef ? dataRef + ' — ' : '') + hora + '</div>' +
      '</div>' +
      '<div class="valor" style="color:#f7b731">R$ ' + val.toFixed(2).replace('.', ',') + '</div>';
    div.insertBefore(item, div.firstChild);
  }

  atualizarResumo();
</script>
</body>
</html>
